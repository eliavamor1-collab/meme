name: meme
description: "Meme soundboard app with OPUS sounds"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  just_audio: ^0.9.42
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  path_provider: ^2.1.4
  file_picker: ^8.1.7
  uuid: ^4.5.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/sounds_config.json
    - assets/BG Image.jpeg
