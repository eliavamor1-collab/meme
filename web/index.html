<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="meme">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="icons/Icon-512.png"/>

  <title>meme</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Audio player using Web Audio API - supports OPUS natively
    var _audioCtx = null;
    var _currentSource = null;
    var _onEndedCallback = null;

    function getAudioContext() {
      if (!_audioCtx) {
        _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      // Resume if suspended (browser autoplay policy)
      if (_audioCtx.state === 'suspended') {
        _audioCtx.resume();
      }
      return _audioCtx;
    }

    window.playOpusAsset = function(url, onEnded) {
      // Stop current sound
      if (_currentSource) {
        try { _currentSource.stop(); } catch(e) {}
        _currentSource = null;
      }

      var ctx = getAudioContext();
      fetch(url)
        .then(function(r) { return r.arrayBuffer(); })
        .then(function(buf) { return ctx.decodeAudioData(buf); })
        .then(function(decoded) {
          var source = ctx.createBufferSource();
          source.buffer = decoded;
          source.connect(ctx.destination);
          source.onended = function() {
            _currentSource = null;
            if (onEnded) onEnded();
          };
          source.start(0);
          _currentSource = source;
        })
        .catch(function(e) {
          console.error('Audio error:', e);
          if (onEnded) onEnded();
        });
    };

    window.stopAudio = function() {
      if (_currentSource) {
        try { _currentSource.stop(); } catch(e) {}
        _currentSource = null;
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
